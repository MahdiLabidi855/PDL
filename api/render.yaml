services:
  # ===== Backend API =====
  - type: web
    name: smart-campus-api
    env: node
    rootDir: api
    plan: free
    buildCommand: npm install
    startCommand: npm run dev
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://smart-campus-frontend.onrender.com